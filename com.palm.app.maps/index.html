<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
	<title>Maps</title>
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name='viewport' content='height=device-height'>
	<script>
		var bingLocale = "en-us";
		if (typeof(PalmSystem) !== "undefined" && PalmSystem.locale){
				bingLocale = PalmSystem.locale.replace("_","-");
		}else if (navigator){
				//Doesn't work on Internet Explorer
				bingLocale = navigator.language;
		}
		var bingURL = "http://maps.webosarchive.org/mapcontrol.ashx?v=7.0.1&mkt="+bingLocale;
		var scriptTag = "<script type='text/javascript' src='" + bingURL + "'\><\/script>";
		document.write(scriptTag);
	</script>
	<script src="/usr/palm/frameworks/enyo/0.10/framework/enyo.js" type="text/javascript"></script>
</head>
<body>
<script type="text/javascript">
	new MapsApp().renderInto(document.body);
</script>
</body>
</html>
